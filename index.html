<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#08080F"/>
<title>The Council</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#08080F;font-family:'Crimson Text',serif;color:#EDE9E3}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:1px}
:root{
  --bg:#08080F;--bg1:#0F0F1A;--bg2:#161622;--bg3:#1E1E2C;
  --gold:#C9A84C;--gdim:rgba(201,168,76,0.12);--gline:rgba(201,168,76,0.25);
  --purple:#7B5EA7;--teal:#3D9D6A;--red:#A03A3A;--blue:#4A7FBF;
  --tx:#EDE9E3;--tx2:#A8A49E;--tx3:#5A5650;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --ff:'Cinzel',serif;--fb:'Crimson Text',serif;--fm:'JetBrains Mono',monospace;
  --r:4px;
}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;max-width:520px;margin:0 auto}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#tech-panel{position:fixed;top:0;right:0;bottom:0;width:min(360px,88vw);background:#0A0A14;border-left:0.5px solid var(--gline);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);z-index:1000;box-shadow:-12px 0 40px rgba(0,0,0,0.7);pointer-events:none}
#tech-panel.open{transform:translateX(0);pointer-events:auto}
#tech-overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:transparent;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.28s ease}
#tech-overlay.open{opacity:1;pointer-events:auto}
/* Only show dim overlay on narrow screens where panel covers the game */
@media(max-width:560px){#tech-overlay.open{background:rgba(0,0,0,0.45)}}
.tp-hdr{padding:52px 20px 16px;border-bottom:0.5px solid var(--bd);flex-shrink:0}
.tp-title{font-family:var(--ff);font-size:12px;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.tp-sub{font-family:var(--fm);font-size:10px;color:var(--tx3);letter-spacing:1px}
.tp-close{position:absolute;top:54px;right:16px;width:26px;height:26px;border-radius:50%;border:0.5px solid var(--bd2);color:var(--tx2);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.tp-close:hover{border-color:var(--gold);color:var(--gold)}
.tp-body{flex:1;overflow-y:auto;padding:16px 20px}
.tp-sec{margin-bottom:20px}
.tp-stit{font-family:var(--ff);font-size:10px;color:var(--gold);letter-spacing:1px;padding-bottom:6px;border-bottom:0.5px solid var(--gline);margin-bottom:10px}
.tp-item{margin-bottom:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--r);border:0.5px solid var(--bd)}
.tp-lbl{font-family:var(--fm);font-size:9px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.tp-val{font-family:var(--fm);font-size:10px;color:var(--tx3);line-height:1.7;word-break:break-all}
.tp-desc{font-size:13px;color:var(--tx2);line-height:1.55;margin-top:5px;font-style:italic}
.tp-link{display:block;font-family:var(--fm);font-size:9px;color:var(--purple);text-decoration:none;letter-spacing:1px;margin-top:6px}
.btn{display:block;width:100%;padding:15px 24px;font-family:var(--ff);font-size:13px;font-weight:600;letter-spacing:2px;border-radius:var(--r);border:none;cursor:pointer;transition:all 0.2s}
.btn-gold{background:var(--gold);color:#08080F}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.btn-dim{background:var(--bg3);color:var(--tx2);border:0.5px solid var(--bd)}
.btn:disabled{opacity:0.3;pointer-events:none}
.badge{font-family:var(--fm);font-size:9px;padding:2px 7px;border-radius:2px;border:0.5px solid;letter-spacing:0.5px;white-space:nowrap;display:inline-block}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:0.5px solid}
.dvd{height:0.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.3;margin:0 24px}
.slbl{font-family:var(--fm);font-size:9px;color:var(--tx2);letter-spacing:2px;margin-bottom:12px}
.tech-bar{display:flex;align-items:center;gap:8px;padding:7px 20px;background:var(--bg1);border-bottom:0.5px solid var(--bd);flex-shrink:0}
.tb-lbl{font-family:var(--fm);font-size:9px;color:var(--tx3);letter-spacing:1px;flex:1}
.tech-pill{display:flex;background:var(--bg3);border:0.5px solid var(--bd2);border-radius:20px;overflow:hidden}
.tech-pill button{padding:5px 14px;font-family:var(--fm);font-size:9px;letter-spacing:0.5px;background:transparent;color:var(--tx2);border:none;cursor:pointer;transition:all 0.2s}
.tech-pill button.on{background:var(--gold);color:#08080F;font-weight:500}
.status-bar{padding:50px 20px 14px;border-bottom:0.5px solid var(--bd);background:var(--bg1);flex-shrink:0}
.prog-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:2px;transition:width 1.2s ease}
.tabs{display:flex;border-bottom:0.5px solid var(--bd);background:var(--bg1);flex-shrink:0}
.tab{flex:1;padding:12px 4px;font-family:var(--fm);font-size:10px;letter-spacing:1px;color:var(--tx2);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.issue-block{padding:22px 0;border-bottom:0.5px solid var(--bd)}
.issue-block:last-child{border-bottom:none}
.issue-num{font-family:var(--fm);font-size:10px;color:var(--tx3);flex-shrink:0;padding-top:3px;min-width:22px}
.issue-num.done{color:var(--teal)}
.issue-label{font-size:18px;color:var(--tx);font-weight:600;line-height:1.3;margin-bottom:5px}
.issue-label.done{color:var(--tx2)}
.issue-status{font-family:var(--fm);font-size:9px;letter-spacing:0.5px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:var(--r);margin-bottom:8px;border:0.5px solid var(--bd);background:rgba(255,255,255,0.01);cursor:pointer;transition:all 0.2s;font-size:17px}
.opt:hover{border-color:var(--bd2)}
.opt.sel{border-color:var(--sel-c);background:rgba(var(--sel-rgb),0.13)}
.opt.locked{cursor:default;opacity:0.3;pointer-events:none}
.opt-radio{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:10px}
.locked-card{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r);border:0.5px solid rgba(61,157,106,0.35);background:rgba(61,157,106,0.07);margin-left:22px}
.session-hdr{padding:14px 20px 12px;border-bottom:0.5px solid var(--bd);background:#09090F;flex-shrink:0}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.r-pills{display:flex;gap:4px;margin:8px 0}
.r-pill{flex:1;height:4px;border-radius:2px;transition:all 0.5s}
.cons-rule{padding:5px 9px;border-radius:3px;margin-top:8px;background:rgba(61,157,106,0.05);border:0.5px solid rgba(61,157,106,0.12);font-family:var(--fm);font-size:9px;line-height:1.6}
.obj-pin{padding:12px 14px;border-radius:var(--r);margin-bottom:24px;background:rgba(201,168,76,0.04);border:0.5px solid var(--gline)}
.obj-tr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,0.04)}
.tx-panel{margin:8px 0 20px;padding:12px 14px;background:#09090F;border-radius:var(--r);border:0.5px solid var(--bd)}
.toast{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid;flex-shrink:0}
.toast.confirm{background:rgba(61,157,106,0.08);border-color:var(--teal)}
.toast.prompt{background:rgba(201,168,76,0.07);border-color:var(--gold)}
.t-icon{font-size:20px;flex-shrink:0}
.t-title{font-size:15px;font-weight:600;margin-bottom:2px}
.t-msg{font-size:14px;color:var(--tx2);line-height:1.5}
.alert-bar{padding:14px 20px;border-bottom:1px solid var(--gold);background:rgba(201,168,76,0.07);flex-shrink:0}
.wx-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-radius:var(--r);margin-bottom:16px;border:0.5px solid var(--bd)}
.wx-bbl{padding:10px 14px;border-radius:var(--r);font-size:16px;line-height:1.55;color:var(--tx)}
.wx-sys{background:rgba(201,168,76,0.06);border:0.5px solid rgba(201,168,76,0.18);border-radius:var(--r);padding:10px 14px;text-align:center;font-family:var(--fm);font-size:10px;color:var(--gold)}
.wx-sig{font-family:var(--fm);font-size:9px;color:var(--teal);margin-top:3px}
.sig-panel{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--bg1);border-top:1px solid var(--purple);padding:16px 20px 32px;transform:translateY(100%);transition:transform 0.3s ease;z-index:500;box-shadow:0 -8px 32px rgba(0,0,0,0.6)}
.sig-panel.open{transform:translateY(0)}
.countdown{font-family:var(--fm);font-size:11px;color:var(--gold);letter-spacing:1px;text-align:center;padding:8px;background:rgba(201,168,76,0.08);border-radius:var(--r);margin-bottom:12px}
.countdown.urgent{color:var(--red)}
.sc-card{padding:16px;border-radius:6px;cursor:pointer;border:1px solid var(--bd2);background:var(--bg1);transition:all 0.2s;margin-bottom:10px}
.sc-card.custom{border-style:dashed}
.f-field{margin-bottom:14px}
.f-lbl{font-family:var(--fm);font-size:9px;color:var(--tx2);letter-spacing:1.5px;margin-bottom:6px;display:block}
.f-inp{width:100%;padding:10px 14px;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:16px;font-family:var(--fb);outline:none;transition:border-color 0.2s}
.f-inp:focus{border-color:var(--gold)}
textarea.f-inp{resize:vertical;min-height:80px;line-height:1.55}
.pw-wrap{position:relative;display:inline-block}
.pw-tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);width:250px;padding:12px 14px;background:var(--bg2);border:0.5px solid var(--gline);border-radius:6px;opacity:0;pointer-events:none;transition:opacity 0.2s ease;font-family:var(--fb);font-size:13px;color:var(--tx2);line-height:1.55;box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:500;text-align:left}
.pw-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--gline)}
.pw-wrap:hover .pw-tip{opacity:1;pointer-events:auto}
.pw-tit{font-family:var(--ff);font-size:10px;letter-spacing:1px;margin-bottom:5px}
#audio-btn{position:fixed;bottom:80px;right:16px;z-index:998;width:32px;height:32px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.2s}
#audio-btn:hover{border-color:var(--gold)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(201,168,76,0.18)}50%{box-shadow:0 0 30px rgba(201,168,76,0.45)}}
@keyframes slidein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes genProgress{0%{margin-left:-60%;width:60%}60%{margin-left:60%;width:40%}100%{margin-left:120%;width:60%}}
</style>
</head>
<body>
<div id="app"></div>
<div id="tech-overlay"></div>
<div id="tech-panel">
  <div class="tp-close" id="tp-close">✕</div>
  <div class="tp-hdr">
    <div class="tp-title">UNDER THE HOOD</div>
    <div class="tp-sub">WHAT AGNTCY &amp; MYCELIUM ARE DOING</div>
  </div>
  <div class="tp-body" id="tp-body"></div>
</div>
<div id="audio-btn">🔊</div>
<script>

const FACTIONS=[{id:'merchant',name:'Merchant Guild',sigil:'⚖',color:'#C9A84C',tagline:'Commerce is power. Every alliance has a price.',desc:'You control the supply chains, the financial networks, and the ledgers that keep the world moving. When you close your routes, everyone feels it within hours.',agentName:'LEDGER',spiffeId:'spiffe://council.agntcy/faction/merchant-guild',offers:[{id:'trade-route',plain:'Open a Trade Route',tech:'grant/trade-route',auth:false,info:'Let another faction use your trade network.'},{id:'port-access',plain:'Share Port Access',tech:'grant/port-access',auth:false,info:'Grant docking rights at your controlled harbors.'},{id:'gold',plain:'Transfer Gold',tech:'resource/gold',auth:false,info:'Move treasury funds to another faction.'},{id:'embargo',plain:'Impose a Trade Embargo ⚠',tech:'sanction/embargo',auth:true,info:"Cut off all trade. Requires your personal sign-off."},{id:'market-intel',plain:'Share Market Intelligence',tech:'intel/market-data',auth:false,info:'Reveal trade flow data to an ally.'}],vetoes:[{plain:'Block Trade Punishment',tech:'veto/trade-sanctions',info:'Block any resolution imposing trade penalties.'}],objectives:['Secure the eastern trade routes in the final treaty','Ensure no embargo without your approval','Have gold transfer rights enshrined in the accord']},{id:'military',name:'Military Order',sigil:'⚔',color:'#A03A3A',tagline:'Force shapes outcomes. Everything else is just talk.',desc:'Your forces hold the perimeter. Without your operational capacity, no agreement can be enforced.',agentName:'VANGUARD',spiffeId:'spiffe://council.agntcy/faction/military-order',offers:[{id:'safe-passage',plain:'Grant Safe Passage',tech:'grant/safe-passage',auth:false,info:'Allow free movement through your territories.'},{id:'def-alliance',plain:'Offer a Defensive Alliance ⚠',tech:'commit/defensive-alliance',auth:true,info:'Pledge military protection. Requires sign-off.'},{id:'non-agg',plain:'Non-Aggression Pact',tech:'commit/non-aggression',auth:false,info:'Commit to peaceful coexistence.'},{id:'blockade',plain:'Impose a Naval Blockade ⚠',tech:'sanction/naval-blockade',auth:true,info:'Cut off sea access. Requires sign-off.'},{id:'troops',plain:'Lend Troops',tech:'resource/troops',auth:false,info:'Provide military personnel for joint operations.'}],vetoes:[{plain:'Block Military Punishment',tech:'veto/military-sanctions',info:'Block any resolution imposing military penalties.'}],objectives:['Ensure military command stays independent','Form a defensive alliance with one faction','Keep the Spy Network out of the final coalition']},{id:'priestly',name:'Priestly Order',sigil:'✦',color:'#4A7FBF',tagline:'Legitimacy is the oldest power. Without it, nothing holds.',desc:'You hold the moral authority that makes agreements stick. Public trust and civil society flow through your institutions.',agentName:'ORACLE',spiffeId:'spiffe://council.agntcy/faction/priestly-order',offers:[{id:'blessing',plain:'Grant a Sacred Blessing',tech:'grant/blessing',auth:false,info:'Publicly endorse a faction, boosting their legitimacy.'},{id:'pilgrimage',plain:'Open Distribution Networks',tech:'grant/pilgrimage-rights',auth:false,info:'Use your networks to distribute aid to communities.'},{id:'moral-auth',plain:'Moral Authority Endorsement',tech:'commit/moral-authority',auth:false,info:'Formally back a resolution as just and righteous.'},{id:'sentiment',plain:'Share Public Mood Report',tech:'intel/public-sentiment',auth:false,info:'Reveal what the people think about current factions.'},{id:'influence',plain:'Transfer Influence',tech:'resource/influence',auth:false,info:'Shift popular support toward another faction.'}],vetoes:[{plain:'Block Sacred Site Decisions',tech:'veto/religious-resolutions',info:'Block any resolution affecting sacred sites or rites.'}],objectives:['Have faith enshrined as advisory in the new accord','Block any military expansion resolution','Receive formal endorsement from two other factions']},{id:'spy',name:'Spy Network',sigil:'◈',color:'#3D9D6A',tagline:"You already know their secrets. The question is when to use them.",desc:"Your agents are everywhere. You trade in information — who owes whom, who lied, who can be turned.",agentName:'SHADOW',spiffeId:'spiffe://council.agntcy/faction/spy-network',offers:[{id:'intel-1',plain:'Share Public Intelligence',tech:'intel/tier-1',auth:false,info:'Reveal non-sensitive information to the Council.'},{id:'intel-2',plain:'Share Classified Intel ⚠',tech:'intel/tier-2',auth:true,info:'Reveal sensitive intelligence. Requires sign-off.'},{id:'dossier',plain:'Deploy a Dossier ⚠⚠',tech:'intel/blackmail',auth:true,info:'Use compromising information as leverage.'},{id:'cover-id',plain:'Provide a Cover Identity',tech:'grant/cover-identity',auth:false,info:'Help a faction operate anonymously.'},{id:'surveillance',plain:'Commit Surveillance',tech:'commit/surveillance',auth:false,info:'Monitor a faction on behalf of an ally.'}],vetoes:[],objectives:['Identify which faction has a hidden compromise','Broker a secret bilateral deal','Ensure surveillance capabilities are not restricted']},{id:'agricultural',name:'Agricultural Collective',sigil:'❋',color:'#5A8A3A',tagline:"You keep the lights on. Never let them forget that.",desc:'Every army, every hospital, every deal at this table depends on the supply chains your people operate.',agentName:'HARVEST',spiffeId:'spiffe://council.agntcy/faction/agricultural-collective',offers:[{id:'grain',plain:'Allocate Supplies',tech:'resource/grain',auth:false,info:'Commit supplies to another faction or the collective.'},{id:'reserves',plain:'Release Emergency Reserves',tech:'resource/reserve',auth:false,info:'Unlock stockpiles for crisis response.'},{id:'land',plain:'Grant Land Rights',tech:'grant/land-rights',auth:false,info:'Transfer territory to another faction.'},{id:'food-pact',plain:'Supply Security Pact',tech:'commit/supply-security',auth:false,info:'Guarantee long-term supply to signatories.'},{id:'food-embargo',plain:'Supply Embargo ⚠',tech:'sanction/supply-embargo',auth:true,info:'Withhold supplies from a faction. Extreme leverage.'}],vetoes:[{plain:'Block Land Seizures',tech:'veto/land-seizure',info:'Block any resolution seizing land or infrastructure.'}],objectives:['Become the supply guarantor in the final treaty','Secure supply agreements with two factions','Prevent any military land seizure from passing']},{id:'scholars',name:'Scholar Conclave',sigil:'⬡',color:'#7B5EA7',tagline:'The next century belongs to those who control knowledge.',desc:"You hold the archives, the universities, and the expertise that solves the hardest problems.",agentName:'AXIOM',spiffeId:'spiffe://council.agntcy/faction/scholar-conclave',offers:[{id:'tech-know',plain:'Share Technical Knowledge',tech:'intel/technical',auth:false,info:'Provide expertise and research findings.'},{id:'research',plain:'Research Treaty',tech:'grant/research-treaty',auth:false,info:'Commit to joint research with another faction.'},{id:'know-share',plain:'Knowledge Sharing Accord',tech:'commit/knowledge-sharing',auth:false,info:'Open your archives to allied factions.'},{id:'archives',plain:'Grant Archive Access',tech:'grant/archive-access',auth:false,info:'Allow a faction to use your records.'},{id:'experts',plain:'Deploy Expert Advisors',tech:'resource/advisors',auth:false,info:'Send specialist advisors to another faction.'}],vetoes:[{plain:'Block Censorship',tech:'veto/censorship',info:'Block any resolution restricting the flow of information.'}],objectives:['Establish a joint research accord in the final treaty','Gain archive access from the Military Order','Have knowledge sharing enshrined as a Council right']}];

const SCENARIO_OFFERS={
  plague:{
    merchant:[{id:'trade-route',plain:'Open a Trade Route',tech:'grant/trade-route',auth:false,info:'Open your trade network for supply movement.'},{id:'gold',plain:'Transfer Gold',tech:'resource/gold',auth:false,info:'Move treasury funds to fund another faction.'},{id:'market-intel',plain:'Share Supply Chain Intelligence',tech:'intel/market-data',auth:false,info:'Reveal where medical supplies are moving and at what price.'},{id:'embargo',plain:'Impose a Trade Embargo ⚠',tech:'sanction/embargo',auth:true,info:"Cut off all trade. Requires your personal sign-off."},{id:'port-access',plain:'Open Emergency Port Access',tech:'grant/port-access',auth:false,info:'Allow emergency supply ships to bypass normal port controls.'}],
    military:[{id:'safe-passage',plain:'Grant Safe Passage',tech:'grant/safe-passage',auth:false,info:'Allow free movement through your controlled territories.'},{id:'troops',plain:'Deploy Field Units',tech:'resource/troops',auth:false,info:'Provide soldiers for quarantine enforcement or supply protection.'},{id:'def-alliance',plain:'Offer a Defensive Alliance ⚠',tech:'commit/defensive-alliance',auth:true,info:'Formally pledge military protection. Requires sign-off.'},{id:'blockade',plain:'Impose a Blockade ⚠',tech:'sanction/blockade',auth:true,info:'Seal a region by force. Requires your sign-off.'},{id:'non-agg',plain:'Non-Aggression Pact',tech:'commit/non-aggression',auth:false,info:'Commit to peaceful coexistence during the crisis.'}],

function el(tag,props={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='cls')e.className=v;
    else if(k.startsWith('on')&&k.length>2)e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='disabled'){if(v)e.disabled=true;}  // only set disabled when truly true
    else if(v!==false&&v!=null)e.setAttribute(k,v); // skip false/null attributes
  }
  for(const c of kids.flat(99)){if(c==null||c===false)continue;e.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return e;
}

function persona(faction,scId){
  // Check built-in personas first, then custom scenario personas
  let p=PERSONAS[scId]?.[faction.id];
  const sc=allScenarios().find(s=>s.id===scId);
  if(!p&&sc?.customPersonas?.[faction.id]) p=sc.customPersonas[faction.id];

  // Offers: built-in table → custom AI-generated → fallback to base faction offers
  let offers=SCENARIO_OFFERS[scId]?.[faction.id];
  if(!offers&&sc?.customOffers?.[faction.id]){
    // Map AI-generated offers: add id and tech fields if missing
    offers=sc.customOffers[faction.id].map((o,i)=>({
      id:`custom-offer-${i}`,
      plain:o.plain,
      tech:o.plain.toLowerCase().replace(/[^a-z0-9]+/g,'-'),
      auth:o.auth||false,
      info:o.info||o.plain,
    }));
  }

  const patch={};
  if(p) Object.assign(patch,p);
  if(offers) patch.offers=offers;
  return Object.keys(patch).length?{...faction,...patch}:faction;
}

function ceTick(round,positions,issues){
  if(!issues.length)return{round:round+1,consensus:{},score:100,done:true,fail:false};
  const consensus={};let prox=0;
  issues.forEach(issue=>{const votes=positions.map(p=>p[issue.id]);const tally={};votes.forEach(v=>{tally[v]=(tally[v]||0)+1;});const[best,count]=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0];const share=count/positions.length;if(share>=0.55){consensus[issue.id]=best;prox+=1;}else{consensus[issue.id]=null;prox+=(share/0.55)*0.85;}});
  const sc=Math.round((prox/issues.length)*100);const allOk=Object.values(consensus).every(v=>v!==null);
  return{round:round+1,consensus,score:sc,done:allOk&&round>=2,fail:round>=5&&!allOk};
}
function joinGame(faction,scenario){

    if(raw){
      // Remap issue keys: the AI uses issue0/issue1 etc, map to actual issue ids
      const remappedTargets={};

        const idx=parseInt(k.replace('issue',''));
        const actualId=scenario.issues[idx]?.id;

      });
      obj={goal:raw.goal,hint:raw.hint,targets:remappedTargets};

function execProposal(proposal){

  const openIssues=scenario.issues.filter(i=>!S.resolvedIssues[i.id]);
  addAudit({type:'proposal',handle:myAgent.handle,round:roundRef+1});
  postMsg(`${myFaction.name}'s agent submitted a proposal. Identity verified ✓`,myFaction.id);
  S.sessionState='waiting';render();
  setTimeout(()=>{
    const openProp={};openIssues.forEach(i=>{openProp[i.id]=proposal[i.id];});

function renderPreserveScroll(){
  // Save scroll position of the negotiate tab scroll area
  const scrollEl = document.querySelector('.scroll');
  const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
  render();
  // Restore after DOM rebuild
  requestAnimationFrame(()=>{
    const newScroll = document.querySelector('.scroll');
    if(newScroll) newScroll.scrollTop = scrollTop;
  });
}

  app.appendChild((screens[S.phase]||scrLanding)());
  if(S.techMode)updateTP();
}
